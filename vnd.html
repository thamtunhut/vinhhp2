<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuyển Đổi Số Tiền Thành Chữ (Tiếng Việt)</title>
    <!-- Tải Tailwind CSS để tạo giao diện đẹp và responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Tùy chỉnh font cho tiếng Việt */
      body {
        font-family: "Inter", sans-serif;
        background-color: #f0f4f8;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <a href="index.html" style="
      position:fixed; top:1rem; left:1rem; z-index:1000;
      display:flex; align-items:center; gap:.4rem;
      padding:.45rem 1rem;
      background:rgba(0,0,0,.35); border:1px solid rgba(0,0,0,.2);
      border-radius:6px; backdrop-filter:blur(4px);
      color:#374151; text-decoration:none;
      font-family:'Inter',sans-serif; font-size:.68rem;
      font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      transition:background .15s, color .15s;
    " onmouseover="this.style.background='rgba(99,102,241,.15)';this.style.color='#4f46e5'"
       onmouseout="this.style.background='rgba(0,0,0,.35)';this.style.color='#374151'">
      ← LINK_HUB
    </a>

    <div
      class="w-full max-w-md bg-white shadow-2xl rounded-2xl p-10 m-4 text-center"
    >
      <h1 class="text-2xl font-bold text-indigo-700 mb-2">
        💸 Chuyển Tiền Thành Chữ
      </h1>
      <p class="text-gray-500 text-sm mb-8">
        Bấm START để tự động Dán số & Copy chữ
      </p>

      <!-- Các ô nhập liệu và kết quả được ẩn đi để tối ưu UI -->
      <div class="hidden">
        <input type="text" id="inputNumber" />
        <textarea id="outputWords" readonly></textarea>
      </div>

      <!-- Nút START duy nhất -->
      <div class="flex justify-center mb-6">
        <button
          id="startButton"
          class="group relative w-48 h-48 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-2xl transition-all duration-300 ease-in-out transform hover:scale-105 active:scale-95 flex flex-col items-center justify-center border-8 border-indigo-100"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-12 w-12 mb-2 group-hover:rotate-12 transition-transform"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
          <span class="text-2xl font-black tracking-widest">START</span>
          <span class="text-[10px] mt-1 opacity-80 uppercase font-bold"
            >Paste & Copy</span
          >
        </button>
      </div>

      <!-- Khu vực hiển thị thông báo và kết quả đã copy -->
      <div
        id="messageBox"
        class="mt-4 p-4 rounded-xl text-sm hidden transition-all duration-500"
      ></div>

      <p class="text-[10px] text-gray-400 mt-8 italic">
        * Yêu cầu quyền truy cập Clipboard để hoạt động.
      </p>
    </div>

    <script>
      // --- CÁC HÀM XỬ LÝ LOGIC ---

      const numberInput = document.getElementById("inputNumber");
      const outputTextarea = document.getElementById("outputWords");
      const startButton = document.getElementById("startButton");
      const messageBox = document.getElementById("messageBox");

      const unit = ["", "nghìn", "triệu", "tỷ", "nghìn tỷ", "triệu tỷ"];
      const numText = [
        "không",
        "một",
        "hai",
        "ba",
        "bốn",
        "năm",
        "sáu",
        "bảy",
        "tám",
        "chín",
      ];
      const prefix = ["lẻ", "mươi", "trăm"];

      function showMessage(title, detail = "", isError = false) {
        messageBox.innerHTML = `<div class="font-bold mb-1">${title}</div><div class="text-xs break-words">${detail}</div>`;
        messageBox.classList.remove(
          "hidden",
          "bg-red-50",
          "text-red-700",
          "bg-green-50",
          "text-green-800",
          "border",
          "border-green-200",
          "border-red-200"
        );

        if (isError) {
          messageBox.classList.add(
            "bg-red-50",
            "text-red-700",
            "border",
            "border-red-200"
          );
        } else {
          messageBox.classList.add(
            "bg-green-50",
            "text-green-800",
            "border",
            "border-green-200"
          );
        }
        messageBox.classList.remove("hidden");
      }

      function readThreeDigits(n, isFirstBlock) {
        let result = "";
        let n1 = Math.floor(n / 100);
        let n2 = Math.floor((n % 100) / 10);
        let n3 = n % 10;

        if (n1 !== 0) {
          result += numText[n1] + " " + prefix[2];
        } else if (!isFirstBlock) {
          result += numText[0] + " " + prefix[2];
        }

        let m = n % 100;
        if (m === 0) {
          // Do nothing
        } else if (m < 10) {
          if (n2 === 0 && n3 !== 0) {
            if (n1 !== 0 || !isFirstBlock) {
              result += " linh";
            }
          }
          result += " " + numText[m];
        } else {
          if (n2 === 1) {
            result += " mười";
          } else if (n2 !== 0) {
            result += " " + numText[n2] + " " + prefix[1];
          }

          if (n3 === 1) {
            if (n2 === 1 || n2 === 0) {
              result += " một";
            } else {
              result += " mốt";
            }
          } else if (n3 === 5) {
            if (n2 !== 0) {
              result += " lăm";
            } else {
              result += " năm";
            }
          } else if (n3 !== 0) {
            result += " " + numText[n3];
          }
        }
        return result.trim().replace(/\s+/g, " ");
      }

      function convertNumberToVietnameseWords(numberStr) {
        let cleanedStr = numberStr.replace(/[^0-9]/g, "");
        if (cleanedStr === "" || cleanedStr === "0") return "Không đồng";
        if (cleanedStr.length > 18) return "Số quá lớn!";

        let number = BigInt(cleanedStr);
        let words = "";
        let count = 0;

        let tempNumber = number;
        let totalBlocks = 0;
        while (tempNumber > 0n) {
          tempNumber /= 1000n;
          totalBlocks++;
        }

        do {
          let n = Number(number % 1000n);
          let isFirstBlock = count === totalBlocks - 1;
          if (n !== 0) {
            let blockWords = readThreeDigits(n, isFirstBlock);
            words = blockWords + " " + unit[count] + " " + words;
          }
          number /= 1000n;
          count++;
        } while (number > 0n);

        words = words.trim().replace(/\s+/g, " ");
        if (words.length > 0) {
          words = words.charAt(0).toUpperCase() + words.slice(1);
        }
        return (words + " đồng").replace(/\s+/g, " ");
      }

      async function handleAction() {
        let pastedText = "";
        // 1. Dán
        try {
          pastedText = await navigator.clipboard.readText();
          numberInput.value = pastedText;
        } catch (err) {
          showMessage(
            "LỖI TRUY CẬP",
            "Vui lòng cấp quyền Clipboard cho trình duyệt.",
            true
          );
          return;
        }

        // 2. Chuyển đổi
        const resultText = convertNumberToVietnameseWords(pastedText);

        if (resultText === "Số quá lớn!") {
          showMessage("LỖI:", "Số quá lớn, không hỗ trợ chuyển đổi.", true);
          return;
        }

        // 3. Sao chép
        try {
          const tempTextArea = document.createElement("textarea");
          tempTextArea.value = resultText;
          document.body.appendChild(tempTextArea);
          tempTextArea.select();
          document.execCommand("copy");
          document.body.removeChild(tempTextArea);

          // Hiển thị kết quả ngay trên màn hình để xác nhận
          showMessage("ĐÃ SAO CHÉP THÀNH CÔNG!", resultText);
        } catch (err) {
          showMessage("LỖI SAO CHÉP", "Không thể tự động copy kết quả.", true);
        }
      }

      startButton.addEventListener("click", handleAction);
    </script>
  </body>
</html>
